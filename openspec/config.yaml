schema: spec-driven

references:
  - docs/PRD.md  # PRD v1.2 - 코드 기준 제품 요구사항 문서

context: |
  ## Project: DRAFT (농구 용병 모집 플랫폼)
  Basketball guest recruiting platform for Korean amateur basketball players.
  Mobile-first adaptive web app (max-width: 430px).

  ## PRD Reference
  전체 제품 요구사항은 docs/PRD.md 참조.
  - Phase 1 (MVP): 게스트 모집 시스템 ✅ 완료
  - Phase 2: 팀 시스템 🚧 개발 중
  - Phase 3+: 결제, 평점, 체육관 제휴 등

  ## Tech Stack
  - Next.js 15 (App Router), TypeScript (Strict), React 19
  - Tailwind CSS 4 + shadcn/ui + Radix UI
  - Supabase (Auth + PostgreSQL + Storage)
  - React Query for server state, React Hook Form + Zod for forms
  - Kakao Maps API for location search

  ## Architecture
  3-Folder: app/ (routing only) → features/ (domain logic) → shared/ (cross-cutting)
  Features must NOT import from other features.
  All files kebab-case. Import aliases: @/features/*, @/shared/*

  ## Domain
  - Host: Team organizer creating matches
  - Guest: Player applying to join matches
  - Match lifecycle: recruiting → completed
  - Positions: G (Guard), F (Forward), C (Center)

  ## Type/Interface Rules
  - Search before creating any new type (rg "interface TypeName|type TypeName" src/)
  - Shared types (2+ features): src/shared/types/
  - Feature-only types: src/features/[name]/model/types.ts
  - API types: src/features/[name]/api/types.ts
  - Create once, import everywhere. No duplicates.

  ## Constraints
  - Mobile-first: max-w-[430px], primary color #FF6600
  - No business logic in app/ directory
  - DB access only via feature API layers (never Supabase from UI)
  - Commit convention: feat/fix/refactor with scope, Co-Authored-By
