name: Architecture Guards

on:
  pull_request:
  push:
    branches:
      - main
      - refactor/designsystem

jobs:
  verify-architecture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run architecture checks
        run: npm run check:architecture

      - name: Build
        run: npm run build
